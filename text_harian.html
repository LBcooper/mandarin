<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>读本 · Mandarin Reader</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;600&family=Ma+Shan+Zheng&display=swap');

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0; min-height: 100%;
  background: var(--bg);
  color: var(--ink);
  font-family: 'Noto Sans SC', sans-serif;
  transition: background .5s ease, color .5s ease;
}

:root {
  --font-scale: 1;
  --radius: 3px;
}

/* ===== Themes ===== */
body[data-theme="paper"] {
  --bg: #EAE6D9; --bg-alt: #E1DCC9; --ink: #2B2620; --ink-soft: rgba(43,38,32,.55);
  --accent: #9C3B2E; --accent-soft: rgba(156,59,46,.14); --grid-line: rgba(156,59,46,.16);
  --card-bg: #F3EFE2; --shadow: rgba(43,38,32,.18); --rule: rgba(43,38,32,.14);
}
body[data-theme="ink"] {
  --bg: #131C26; --bg-alt: #1B2733; --ink: #DCD7C5; --ink-soft: rgba(220,215,197,.55);
  --accent: #C9A34E; --accent-soft: rgba(201,163,78,.14); --grid-line: rgba(201,163,78,.14);
  --card-bg: #1B2733; --shadow: rgba(0,0,0,.5); --rule: rgba(220,215,197,.14);
}
body[data-theme="dusk"] {
  --bg: #241A12; --bg-alt: #2E2117; --ink: #EAD9B8; --ink-soft: rgba(234,217,184,.55);
  --accent: #4F8A72; --accent-soft: rgba(79,138,114,.16); --grid-line: rgba(79,138,114,.16);
  --card-bg: #2E2117; --shadow: rgba(0,0,0,.45); --rule: rgba(234,217,184,.14);
}
body[data-theme="notebook"] {
  --bg: #F5F2E8; --bg-alt: #EFEBDD; --ink: #26324F; --ink-soft: rgba(38,50,79,.55);
  --accent: #C0392B; --accent-soft: rgba(192,57,43,.12); --grid-line: rgba(192,57,43,.32);
  --card-bg: #FFFFFF; --shadow: rgba(38,50,79,.14); --rule: rgba(38,50,79,.14);
}

::selection { background: var(--accent-soft); }

/* ===== Layout shells ===== */
#app { min-height: 100vh; }
.wrap { max-width: 680px; margin: 0 auto; padding: 0 24px; }

/* ===== Cover / contents screen ===== */
#cover { padding: 64px 0 80px; }
.cover-head { text-align: center; margin-bottom: 44px; }
.brush-title {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: 96px;
  line-height: 1;
  color: var(--accent);
  margin: 0;
}
.cover-sub {
  font-family: 'Noto Serif SC', serif;
  font-size: 15px;
  letter-spacing: .12em;
  color: var(--ink-soft);
  margin-top: 10px;
}

.theme-row {
  display: flex; justify-content: center; gap: 10px; margin-top: 22px;
}
.swatch {
  width: 26px; height: 26px; border-radius: 50%;
  border: 2px solid var(--rule);
  cursor: pointer; padding: 0; position: relative;
  transition: transform .2s ease, border-color .2s ease;
}
.swatch:hover { transform: translateY(-2px); }
.swatch[aria-pressed="true"] { border-color: var(--accent); }
.swatch[aria-pressed="true"]::after {
  content: ""; position: absolute; inset: -6px; border: 1px solid var(--accent);
  border-radius: 50%;
}
.swatch.sw-paper { background: #EAE6D9; }
.swatch.sw-ink { background: #131C26; }
.swatch.sw-dusk { background: #241A12; }
.swatch.sw-notebook { background: #F5F2E8; box-shadow: inset 0 0 0 1px rgba(192,57,43,.4); }

.lesson-grid { display: flex; flex-direction: column; gap: 16px; }
.lesson-card {
  display: flex; align-items: stretch; gap: 18px;
  background: var(--card-bg);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  padding: 18px 20px;
  cursor: pointer; text-align: left;
  box-shadow: 0 6px 18px -12px var(--shadow);
  transition: transform .25s ease, box-shadow .25s ease;
  font-family: inherit; color: inherit; width: 100%;
}
.lesson-card:hover { transform: translateY(-3px); box-shadow: 0 12px 24px -14px var(--shadow); }
.lesson-card:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

.tzg {
  flex: 0 0 52px; width: 52px; height: 52px;
  position: relative;
  border: 1.5px solid var(--grid-line);
}
.tzg::before, .tzg::after {
  content: ""; position: absolute; background: var(--grid-line);
}
.tzg::before { top: 0; bottom: 0; left: 50%; width: 1.5px; }
.tzg::after { left: 0; right: 0; top: 50%; height: 1.5px; }
.tzg span {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  font-family: 'Noto Serif SC', serif; font-weight: 700; font-size: 26px; color: var(--accent);
}

.lesson-meta { flex: 1; min-width: 0; }
.lesson-title {
  font-family: 'Noto Serif SC', serif; font-weight: 700; font-size: 19px; margin: 0 0 4px;
}
.lesson-blurb { font-size: 13.5px; color: var(--ink-soft); line-height: 1.5; margin: 0; }
.lesson-foot {
  margin-top: 8px; font-size: 12px; color: var(--ink-soft);
  display: flex; gap: 12px; align-items: center;
}
.stamp-dot {
  width: 8px; height: 8px; border-radius: 50%; border: 1.5px solid var(--ink-soft); display: inline-block;
}
.stamp-dot.done { background: var(--accent); border-color: var(--accent); }

/* ===== Reader screen ===== */
#reader { display: none; padding: 26px 0 100px; }
.bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 0 22px; gap: 14px; flex-wrap: wrap;
}
.back-btn {
  background: none; border: none; cursor: pointer;
  font-family: 'Noto Sans SC', sans-serif; font-size: 14px; color: var(--ink-soft);
  display: flex; align-items: center; gap: 6px; padding: 6px 8px; border-radius: var(--radius);
}
.back-btn:hover { color: var(--ink); }
.back-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

.bar-controls { display: flex; align-items: center; gap: 16px; }
.font-ctrl { display: flex; align-items: center; gap: 4px; }
.font-ctrl button {
  width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--rule);
  background: var(--card-bg); color: var(--ink); cursor: pointer; font-size: 13px;
  display: flex; align-items: center; justify-content: center;
}
.font-ctrl button:hover { border-color: var(--accent); color: var(--accent); }
.font-ctrl button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.mini-swatches { display: flex; gap: 6px; }
.mini-swatches .swatch { width: 18px; height: 18px; }

.title-block { position: relative; margin-bottom: 8px; }
.reader-ordinal {
  font-family: 'Noto Serif SC', serif; font-size: 13px; letter-spacing: .18em;
  color: var(--accent); text-transform: uppercase; margin: 0 0 6px;
}
.reader-title {
  font-family: 'Noto Serif SC', serif; font-weight: 700; font-size: 30px; margin: 0;
}
.reader-rule { height: 1px; background: var(--rule); margin: 18px 0 30px; }

.reading-paper { position: relative; padding: 6px 0 10px; }
body[data-theme="notebook"] .reading-paper {
  background-image:
    repeating-linear-gradient(var(--bg-alt) 0 0),
    repeating-linear-gradient(0deg, transparent 0 37px, var(--grid-line) 37px 38px);
  background-blend-mode: normal;
  padding: 14px 18px; border-radius: 2px;
  box-shadow: inset 0 0 0 1px var(--grid-line);
}

p.para {
  font-family: 'Noto Serif SC', serif;
  font-size: calc(1.2rem * var(--font-scale));
  line-height: 2.15;
  letter-spacing: .02em;
  margin: 0 0 1.6em;
  opacity: .32;
  transition: opacity .5s ease;
}
p.para.active { opacity: 1; }
@media (prefers-reduced-motion: reduce) {
  p.para { opacity: 1 !important; transition: none; }
}

.finish-row { margin-top: 20px; display: flex; justify-content: center; }
.finish-col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.finish-btn {
  font-family: 'Noto Sans SC', sans-serif; font-size: 14px; font-weight: 500;
  background: var(--accent); color: var(--bg); border: none; border-radius: 999px;
  padding: 12px 26px; cursor: pointer; letter-spacing: .04em;
  transition: transform .2s ease, opacity .2s ease, background .2s ease;
}
.finish-btn:hover { transform: translateY(-2px); }
.finish-btn.done { background: transparent; color: var(--ink-soft); box-shadow: inset 0 0 0 1px var(--rule); }
.finish-btn.done:hover { color: var(--accent); box-shadow: inset 0 0 0 1px var(--accent); }
.finish-btn:focus-visible { outline: 2px solid var(--ink); outline-offset: 3px; }
.finish-hint { font-size: 12px; color: var(--ink-soft); margin: 0; min-height: 14px; }

.stamp {
  position: absolute; top: -6px; right: 0;
  width: 84px; height: 84px;
  display: flex; align-items: center; justify-content: center;
  color: var(--accent);
  opacity: 0; transform: scale(1.6) rotate(-14deg);
  pointer-events: none;
}
.stamp.show {
  animation: stampIn .5s cubic-bezier(.2,1.6,.4,1) forwards;
}
.stamp.hide {
  animation: stampOut .3s ease forwards;
}
@keyframes stampIn {
  0% { opacity: 0; transform: scale(1.7) rotate(-18deg); }
  60% { opacity: 1; transform: scale(.92) rotate(-8deg); }
  100% { opacity: .92; transform: scale(1) rotate(-8deg); }
}
@keyframes stampOut {
  0% { opacity: .92; transform: scale(1) rotate(-8deg); }
  100% { opacity: 0; transform: scale(.8) rotate(-2deg); }
}
@media (prefers-reduced-motion: reduce) {
  .stamp.show { animation: none; opacity: .92; transform: scale(1) rotate(-8deg); }
  .stamp.hide { animation: none; opacity: 0; }
}
.stamp svg { width: 100%; height: 100%; }

.nav-row {
  display: flex; justify-content: space-between; margin-top: 40px;
  border-top: 1px solid var(--rule); padding-top: 20px;
}
.nav-link {
  background: none; border: none; cursor: pointer; font-family: 'Noto Sans SC', sans-serif;
  font-size: 13px; color: var(--ink-soft); display: flex; flex-direction: column; gap: 2px;
  padding: 4px;
}
.nav-link span.cn { font-family: 'Noto Serif SC', serif; font-size: 15px; color: var(--ink); }
.nav-link:hover span.cn { color: var(--accent); }
.nav-link:disabled { visibility: hidden; }
.nav-link.next { text-align: right; align-items: flex-end; }
.nav-link:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

@media (max-width: 480px) {
  .brush-title { font-size: 72px; }
  .lesson-card { flex-direction: row; padding: 14px; }
  .reader-title { font-size: 24px; }
}
</style>
</head>
<body data-theme="paper">
<div id="app">

  <!-- ===== Cover ===== -->
  <section id="cover">
    <div class="wrap">
      <div class="cover-head">
        <p class="brush-title">读</p>
        <p class="cover-sub">汉语读本 · 三课</p>
        <div class="theme-row" id="themeRow" role="group" aria-label="选择主题"></div>
      </div>
      <div class="lesson-grid" id="lessonGrid"></div>
    </div>
  </section>

  <!-- ===== Reader ===== -->
  <section id="reader">
    <div class="wrap">
      <div class="bar">
        <button class="back-btn" id="backBtn" aria-label="返回目录">← 目录</button>
        <div class="bar-controls">
          <div class="mini-swatches" id="miniThemeRow" role="group" aria-label="切换主题"></div>
          <div class="font-ctrl">
            <button id="fontMinus" aria-label="缩小字号">A−</button>
            <button id="fontPlus" aria-label="放大字号">A+</button>
          </div>
        </div>
      </div>

      <div class="title-block">
        <p class="reader-ordinal" id="readerOrdinalLabel"></p>
        <h1 class="reader-title" id="readerTitle"></h1>
        <div class="stamp" id="stamp" aria-hidden="true">
          <svg viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="46" fill="none" stroke="currentColor" stroke-width="3"/>
            <circle cx="50" cy="50" r="38" fill="none" stroke="currentColor" stroke-width="1.5"/>
            <text x="50" y="46" text-anchor="middle" font-family="'Ma Shan Zheng', cursive" font-size="26" fill="currentColor">读毕</text>
            <text x="50" y="66" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="9" fill="currentColor" id="stampDate"></text>
          </svg>
        </div>
      </div>
      <div class="reader-rule"></div>

      <div class="reading-paper" id="readingPaper"></div>

      <div class="finish-row">
        <div class="finish-col">
          <button class="finish-btn" id="finishBtn">标记为读完</button>
          <p class="finish-hint" id="finishHint"></p>
        </div>
      </div>

      <div class="nav-row">
        <button class="nav-link prev" id="prevBtn">
          <span>上一课</span>
          <span class="cn" id="prevTitle"></span>
        </button>
        <button class="nav-link next" id="nextBtn">
          <span>下一课</span>
          <span class="cn" id="nextTitle"></span>
        </button>
      </div>
    </div>
  </section>

</div>

<script>
(function () {
  const LESSONS = [
    {
      id: 1, ordinal: '一',
      title: '我的一周',
      blurb: '从星期天的早饭到公园里的秋天，普通一周的几段记录。',
      paragraphs: [
        '今天星期天，我起床不早。我和家人一起吃早饭。妈妈做面条儿，爸爸喝牛奶。今天天气不错，有太阳，我觉得非常高兴。',
        '午饭以后，我和朋友出去。我们坐地铁去商场。商场非常大，人很多。我想买新上衣和黑色裤子。朋友喜欢看鞋。走路让我们觉得累。我们去买咖啡和蛋糕。我们坐下来聊天儿。我喜欢读书和听音乐，他喜欢打篮球。',
        '晚上，我们回去吃晚饭。晚饭是米饭、鱼和菜。吃完，我看电视。我觉得有点儿累，我去睡觉。',
        '昨天是星期一。早上我去上学。学校离家不远，我经常走路去学校，有时坐公交车。上午我们有汉语课和数学课。老师教新字和读课文。我觉得汉字不太难，但是写汉字有点儿累。中午，我和同学一起吃饭。我们吃米饭和鸡蛋。下午没有课，我回房间休息。我用电脑上网，看电影。电影非常有意思。晚上我做作业，复习课文。虽然忙，但是觉得很快乐。',
        '我的爱好是运动和旅游。秋天天气凉快，我和家人去公园。公园里面有草地和树，非常漂亮。我们看见鸟，还拍照。弟弟喜欢跑步，妹妹喜欢画画。我觉得在公园走路非常舒服。希望明年我们可以去外国旅游。'
      ]
    },
    {
      id: 2, ordinal: '二',
      title: '动物园的一天',
      blurb: '和姐姐去看大熊猫，在饭馆吃饭，路上遇见一个迷路的小孩儿。',
      paragraphs: [
        '周末，天气非常晴。我和姐姐去动物园。我们坐地铁过去。地铁里人不多。动物园的门票不贵。',
        '进去以后，我们先看见大熊猫。大熊猫非常可爱，在吃东西。好多人在拍照。然后我们去看鸟。鸟在树上唱歌，我觉得很好听。',
        '走了一会儿，我觉得有点儿累。我们在旁边坐下来休息。姐姐去商店买矿泉水。我喝了一瓶水。',
        '中午，我们出去吃饭。附近有一家饭馆。我们点了一盘肉和两个菜，还喝了红茶。菜很好吃，我们吃得饱。',
        '下午，我们又进去看别的动物。看见一个小孩儿在哭。他找不到妈妈，很着急。工作人员帮助了他。',
        '后来，我们坐公交车回家。虽然身体累，但是心里很快乐。晚上，我写日记。',
        '今天下雨，天气阴。我在家看书，不出去。我觉得这样的周末很有意思。'
      ]
    },
    {
      id: 3, ordinal: '三',
      title: '帮朋友搬家',
      blurb: '坐出租车去帮朋友搬新家，一起吃饭、打扫，最后收到一本书作礼物。',
      paragraphs: [
        '今天星期天，天气非常好。朋友搬家，我去帮忙。他的新家在那边，离学校比较远。我坐出租车过去，大概用了二十分钟。',
        '到以后，看见好多人在工作。有大人，也有小孩儿。我们把箱子、衣服和书搬上去。楼很高，没有电梯，走路上去。走了两次才搬完。我觉得累，但是高兴能帮助朋友。',
        '中午，朋友请客，在附近的饭馆吃饭。饭馆的环境很干净，人不多，很安静。点了很多菜，有肉，有鱼，还有鸡蛋。大家一边吃饭一边聊天儿。朋友说，房子虽然有点儿旧，但是很大，而且方便。旁边就有超市和公园，买东西、运动都很近。',
        '吃完饭，大家一起打扫房间。女朋友在放衣服。下午四点，房间终于变干净了。我们坐下来休息，喝水。朋友对我说"谢谢"，送给我一个礼物。是一本关于历史的书，我很喜欢。',
        '晚上我回家，洗澡，觉得很舒服。虽然今天很忙，但是很有意思。'
      ]
    },
    {
    id: 4, ordinal: '四',
    title: '去医院看病',
    blurb: '晚上发烧，爸爸带我去医院看病，医生说是感冒，开了药回家休息。',
    paragraphs: [
        '今天下雨，天气阴。昨天晚上，我开始觉得冷，而且头很疼。妈妈说我发烧了。今天早上，爸爸带我去医院看病。医院里面人很多，我们等了一个小时。终于医生看我了。',
        '医生问我：“你怎么了？哪里不舒服？”我告诉医生：“我头疼，觉得累，不想吃饭。”医生检查了我的身体，说我感冒了，没关系。医生让我多喝水，多休息，还给我开了药。我们去药店买药。',
        '回家以后，我吃药，睡觉。今天一天都没有出门。'
    ]
    },
    {
    id: 5, ordinal: '五',
    title: '去外国旅游',
    blurb: '坐飞机去外国旅游，到酒店休息，吃晚饭，准备明天的行程。',
    paragraphs: [
        '下个星期，我要去外国旅游。我去机场坐飞机。机场非常大，里面有很多外国人。我检查行李，带了一个大箱子和一个小书包。飞机马上要起飞了，我坐在椅子上。在飞机上，我看了一本电子书，还睡了一会儿。',
        '飞了三个小时，终于到了。出机场以后，我打车去酒店。酒店房间很干净，也很舒服。把行李放在房间里面以后，我出去吃饭。',
        '我在附近的饭馆点了一盘鱼和一碗米饭。吃完饭，我回酒店洗澡，准备休息。明天我要开始旅游，我希望天气好。'
    ]
    },
    {
    id: 6, ordinal: '六',
    title: '开学第一天',
    blurb: '新学期开学，去学校上课，学习数学和汉语，下课和同学一起玩。',
    paragraphs: [
        '今天开学，我是中学生了。早上起来，吃完早饭，我拿书包去学校。学校离我家近，我经常骑自行车去学校，有时坐公交车。到了学校，我进教室，看见好多同学。大家都在聊天，非常高兴。',
        '第一节是数学课。数学老师很认真，教得很好。我听懂了，但是做题还是有点难。下课后，我们去球场上玩。有的同学打篮球，有的踢足球。我不太会踢足球，所以在旁边读书。',
        '中午我们在学校附近吃饭。下午有汉语课和外语课。我觉得学习外语很有意思。下午放学回家，我先做作业，然后复习课文。'
    ]
    },
    {
    id: 7, ordinal: '七',
    title: '去朋友家做客',
    blurb: '去朋友新家做客，带礼物，吃了一顿开心的饭。',

  const THEMES = [
    { id: 'paper', label: '宣纸' },
    { id: 'ink', label: '水墨' },
    { id: 'dusk', label: '黄昏' },
    { id: 'notebook', label: '习字本' }
  ];

  let state = { theme: 'paper', fontScale: 1, completed: [] };
  let currentLesson = null;
  let observer = null;
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  const $ = (sel) => document.querySelector(sel);

  function estMinutes(paragraphs) {
    const chars = paragraphs.join('').length;
    return Math.max(1, Math.round(chars / 90));
  }

  async function loadSettings() {
    try {
      const res = await window.storage.get('reader-settings', false);
      if (res && res.value) {
        const parsed = JSON.parse(res.value);
        state = Object.assign(state, parsed);
      }
    } catch (e) { /* no saved settings yet, use defaults */ }
    applyTheme(state.theme);
    applyFontScale(state.fontScale);
  }

  async function saveSettings() {
    try {
      await window.storage.set('reader-settings', JSON.stringify(state), false);
    } catch (e) { /* saving failed silently, non-critical */ }
  }

  function applyTheme(name) {
    state.theme = name;
    document.body.setAttribute('data-theme', name);
    document.querySelectorAll('.swatch').forEach(btn => {
      btn.setAttribute('aria-pressed', btn.dataset.theme === name ? 'true' : 'false');
    });
  }

  function applyFontScale(scale) {
    state.fontScale = Math.min(1.4, Math.max(0.85, scale));
    document.documentElement.style.setProperty('--font-scale', state.fontScale);
  }

  function buildThemeRow(container, small) {
    container.innerHTML = '';
    THEMES.forEach(t => {
      const b = document.createElement('button');
      b.className = 'swatch sw-' + t.id;
      b.dataset.theme = t.id;
      b.setAttribute('aria-label', t.label);
      b.setAttribute('aria-pressed', 'false');
      b.addEventListener('click', () => { applyTheme(t.id); saveSettings(); });
      container.appendChild(b);
    });
  }

  function renderCover() {
    const grid = $('#lessonGrid');
    grid.innerHTML = '';
    LESSONS.forEach((lesson, idx) => {
      const done = state.completed.includes(lesson.id);
      const card = document.createElement('button');
      card.className = 'lesson-card';
      card.innerHTML = `
        <div class="tzg"><span>${lesson.ordinal}</span></div>
        <div class="lesson-meta">
          <p class="lesson-title">第${lesson.ordinal}课 · ${lesson.title}</p>
          <p class="lesson-blurb">${lesson.blurb}</p>
          <div class="lesson-foot">
            <span><span class="stamp-dot ${done ? 'done' : ''}"></span> ${done ? '已读完' : '未读'}</span>
            <span>约 ${estMinutes(lesson.paragraphs)} 分钟</span>
          </div>
        </div>`;
      card.addEventListener('click', () => openLesson(idx));
      grid.appendChild(card);
    });
  }

  function openLesson(index) {
    currentLesson = index;
    const lesson = LESSONS[index];
    $('#cover').style.display = 'none';
    $('#reader').style.display = 'block';
    window.scrollTo(0, 0);

    $('#readerOrdinalLabel').textContent = '第 ' + lesson.ordinal + ' 课';
    $('#readerTitle').textContent = lesson.title;

    const paper = $('#readingPaper');
    paper.innerHTML = '';
    lesson.paragraphs.forEach((text, i) => {
      const p = document.createElement('p');
      p.className = 'para';
      p.textContent = text;
      paper.appendChild(p);
    });

    setupObserver(paper);

    const stamp = $('#stamp');
    stamp.classList.remove('show', 'hide');
    const done = state.completed.includes(lesson.id);
    if (done) {
      stamp.classList.add('show');
      $('#stampDate').textContent = '已读';
    }
    updateFinishBtn(done);

    const prev = LESSONS[index - 1];
    const next = LESSONS[index + 1];
    $('#prevBtn').disabled = !prev;
    $('#nextBtn').disabled = !next;
    $('#prevTitle').textContent = prev ? prev.title : '';
    $('#nextTitle').textContent = next ? next.title : '';
  }

  function closeLesson() {
    if (observer) observer.disconnect();
    $('#reader').style.display = 'none';
    $('#cover').style.display = 'block';
    renderCover();
    window.scrollTo(0, 0);
  }

  function setupObserver(paper) {
    if (observer) observer.disconnect();
    const paras = paper.querySelectorAll('.para');
    if (reduceMotion) {
      paras.forEach(p => p.classList.add('active'));
      return;
    }
    observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        entry.target.classList.toggle('active', entry.isIntersecting);
      });
    }, { root: null, rootMargin: '-35% 0px -40% 0px', threshold: 0 });
    paras.forEach(p => observer.observe(p));
  }

  function updateFinishBtn(done) {
    const btn = $('#finishBtn');
    btn.classList.toggle('done', done);
    btn.textContent = done ? '取消标记' : '标记为读完';
    $('#finishHint').textContent = done ? '再点一次可以取消这个标记' : '';
  }

  function toggleComplete() {
    const lesson = LESSONS[currentLesson];
    const stamp = $('#stamp');
    const nowDone = !state.completed.includes(lesson.id);

    state.completed = nowDone
      ? state.completed.concat(lesson.id)
      : state.completed.filter(id => id !== lesson.id);
    saveSettings();
    updateFinishBtn(nowDone);

    if (nowDone) {
      const d = new Date();
      $('#stampDate').textContent = (d.getMonth() + 1) + '/' + d.getDate();
      stamp.classList.remove('hide');
      stamp.classList.remove('show');
      void stamp.offsetWidth;
      stamp.classList.add('show');
    } else {
      stamp.classList.remove('show');
      stamp.classList.add('hide');
    }
  }

  // wire up
  buildThemeRow($('#themeRow'));
  buildThemeRow($('#miniThemeRow'));
  $('#backBtn').addEventListener('click', closeLesson);
  $('#finishBtn').addEventListener('click', toggleComplete);
  $('#fontMinus').addEventListener('click', () => { applyFontScale(state.fontScale - 0.1); saveSettings(); });
  $('#fontPlus').addEventListener('click', () => { applyFontScale(state.fontScale + 0.1); saveSettings(); });
  $('#prevBtn').addEventListener('click', () => { if (currentLesson > 0) openLesson(currentLesson - 1); });
  $('#nextBtn').addEventListener('click', () => { if (currentLesson < LESSONS.length - 1) openLesson(currentLesson + 1); });

  loadSettings().then(renderCover);
})();
