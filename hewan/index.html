<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mandarin everyday word flashcard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f0f13;
    color: #e8e6e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }

  h1 {
    font-size: 1.1rem;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 0.4rem;
  }

  .subtitle {
    font-size: 0.8rem;
    color: #555;
    margin-bottom: 2.5rem;
    letter-spacing: 0.06em;
  }

  .counter {
    font-size: 0.82rem;
    color: #666;
    margin-bottom: 1.2rem;
    letter-spacing: 0.05em;
  }

  .scene {
    width: 380px;
    max-width: 100%;
    height: 240px;
    perspective: 1000px;
    cursor: pointer;
    margin-bottom: 2rem;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 16px;
  }

  .card.flipped {
    transform: rotateY(180deg);
  }

  .face {
    position: absolute;
    inset: 0;
    border-radius: 16px;
    backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    border: 1px solid #2a2a35;
    user-select: none;
  }

  .face-front {
    background: #18181f;
  }

  .face-back {
    background: #161b28;
    transform: rotateY(180deg);
    border-color: #1e2a40;
  }

  .hint {
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #444;
    position: absolute;
    top: 1rem;
  }

  .hanzi {
    font-size: 3.8rem;
    font-weight: 300;
    color: #f0ede6;
    line-height: 1;
  }

  .pinyin {
    font-size: 1rem;
    color: #6a8fc0;
    font-style: italic;
    letter-spacing: 0.04em;
  }

  .english {
    font-size: 1.5rem;
    font-weight: 500;
    color: #e0ddd6;
    letter-spacing: 0.02em;
  }

  .category-badge {
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #3a5478;
    background: #0f1a2a;
    border: 1px solid #1e2a40;
    padding: 3px 10px;
    border-radius: 20px;
    position: absolute;
    bottom: 1rem;
  }

  .controls {
    display: flex;
    gap: 1rem;
    align-items: center;
  }

  button {
    background: #18181f;
    border: 1px solid #2a2a35;
    color: #aaa;
    padding: 0.55rem 1.4rem;
    border-radius: 8px;
    font-size: 0.85rem;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.15s;
  }

  button:hover { background: #22222c; border-color: #3a3a4a; color: #ddd; }
  button:active { transform: scale(0.97); }

  button.primary {
    background: #1a2a42;
    border-color: #2a4060;
    color: #7aadde;
  }
  button.primary:hover { background: #1f3350; }

  .progress-bar {
    width: 380px;
    max-width: 100%;
    height: 3px;
    background: #1a1a22;
    border-radius: 2px;
    margin-bottom: 2rem;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: #2a5080;
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  .category-filter {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    justify-content: center;
    margin-bottom: 2rem;
    max-width: 500px;
  }

  .filter-btn {
    font-size: 0.72rem;
    padding: 0.3rem 0.9rem;
    border-radius: 20px;
    letter-spacing: 0.06em;
  }

  .filter-btn.active {
    background: #1a2a42;
    border-color: #2a4060;
    color: #7aadde;
  }

  .tap-hint {
    font-size: 0.75rem;
    color: #444;
    letter-spacing: 0.06em;
    margin-top: -1rem;
    margin-bottom: 0.5rem;
  }
</style>
</head>
<body>
<h1>动物用语</h1>
<p class="subtitle">Mandarin Animal Vocabulary</p>

<div class="category-filter" id="filters"></div>

<!-- Updated to 54 cards based on the array length -->
<div class="counter" id="counter">Card 1 of 54</div>

<div class="progress-bar">
  <div class="progress-fill" id="progress"></div>
</div>

<div class="scene" onclick="flipCard()" id="scene" title="Click to flip">
  <div class="card" id="card">
    <div class="face face-front">
      <span class="hint">tap to reveal</span>
      <!-- Placeholder updated to match the first card in the array -->
      <div class="hanzi" id="hanzi">宠物</div>
      <div class="category-badge" id="cat-front">Pets & General</div>
    </div>
    <div class="face face-back">
      <span class="hint">english</span>
      <div class="pinyin" id="pinyin">chǒngwù</div>
      <div class="english" id="english">Pet</div>
      <div class="category-badge" id="cat-back">Pets & General</div>
    </div>
  </div>
</div>

<p class="tap-hint">click the card to flip</p>

<div class="controls">
  <button onclick="prev()">← Prev</button>
  <button onclick="shuffle()" class="primary">Shuffle</button>
  <button onclick="next()">Next →</button>
</div>

<script>
const ALL_CARDS = [
  { hanzi: "宠物", pinyin: "chǒngwù", english: "Pet", cat: "Pets & General" },
  { hanzi: "猫", pinyin: "māo", english: "Cat", cat: "Pets & General" },
  { hanzi: "狗", pinyin: "gǒu", english: "Dog", cat: "Pets & General" },
  { hanzi: "兔子", pinyin: "tùzi", english: "Rabbit", cat: "Pets & General" },

  { hanzi: "狮子", pinyin: "shīzi", english: "Lion", cat: "Big Cats & Predators" },
  { hanzi: "老虎", pinyin: "lǎohǔ", english: "Tiger", cat: "Big Cats & Predators" },
  { hanzi: "美洲豹", pinyin: "měizhōubào", english: "Jaguar", cat: "Big Cats & Predators" },
  { hanzi: "猎豹", pinyin: "lièbào", english: "Cheetah", cat: "Big Cats & Predators" },
  { hanzi: "狼", pinyin: "láng", english: "Wolf", cat: "Big Cats & Predators" },

  { hanzi: "熊猫", pinyin: "xióngmāo", english: "Panda", cat: "Bears" },
  { hanzi: "熊", pinyin: "xióng", english: "Bear", cat: "Bears" },
  { hanzi: "北极熊", pinyin: "běijíxióng", english: "Polar bear", cat: "Bears" },
  { hanzi: "蜜熊", pinyin: "mìxióng", english: "Honey bear", cat: "Bears" },
  { hanzi: "灰熊", pinyin: "huīxióng", english: "Grizzly bear", cat: "Bears" },

  { hanzi: "牛", pinyin: "niú", english: "Cow", cat: "Farm & Grassland Animals" },
  { hanzi: "马", pinyin: "mǎ", english: "Horse", cat: "Farm & Grassland Animals" },
  { hanzi: "鹿", pinyin: "lù", english: "Deer", cat: "Farm & Grassland Animals" },
  { hanzi: "斑马", pinyin: "bānmǎ", english: "Zebra", cat: "Farm & Grassland Animals" },
  { hanzi: "瞪羚", pinyin: "dènglíng", english: "Gazelle", cat: "Farm & Grassland Animals" },
  { hanzi: "野牛", pinyin: "yěniú", english: "Bison", cat: "Farm & Grassland Animals" },
  { hanzi: "羊", pinyin: "yáng", english: "Sheep / goat", cat: "Farm & Grassland Animals" },
  { hanzi: "猪", pinyin: "zhū", english: "Pig", cat: "Farm & Grassland Animals" },
  { hanzi: "鸭", pinyin: "yā", english: "Duck", cat: "Farm & Grassland Animals" },

  { hanzi: "大象", pinyin: "dàxiàng", english: "Elephant", cat: "Large Mammals" },
  { hanzi: "长颈鹿", pinyin: "chángjǐnglù", english: "Giraffe", cat: "Large Mammals" },
  { hanzi: "猴", pinyin: "hóu", english: "Monkey", cat: "Large Mammals" },
  { hanzi: "大猩猩", pinyin: "dàxīngxing", english: "Gorilla", cat: "Large Mammals" },

  { hanzi: "蛇", pinyin: "shé", english: "Snake", cat: "Insects & Small Creatures" },
  { hanzi: "虫", pinyin: "chóng", english: "Worm", cat: "Insects & Small Creatures" },
  { hanzi: "毛毛虫", pinyin: "máomaochóng", english: "Caterpillar", cat: "Insects & Small Creatures" },
  { hanzi: "蜗牛", pinyin: "wōniú", english: "Snail", cat: "Insects & Small Creatures" },
  { hanzi: "蚂蚁", pinyin: "mǎyǐ", english: "Ant", cat: "Insects & Small Creatures" },
  { hanzi: "蝴蝶", pinyin: "húdié", english: "Butterfly", cat: "Insects & Small Creatures" },
  { hanzi: "苍蝇", pinyin: "cāngying", english: "Fly", cat: "Insects & Small Creatures" },
  { hanzi: "蚊子", pinyin: "wénzi", english: "Mosquito", cat: "Insects & Small Creatures" },
  { hanzi: "蜘蛛", pinyin: "zhīzhū", english: "Spider", cat: "Insects & Small Creatures" },

  { hanzi: "鱼", pinyin: "yú", english: "Fish", cat: "Fish" },
  { hanzi: "鲑鱼", pinyin: "guīyú", english: "Salmon", cat: "Fish" },
  { hanzi: "金鱼", pinyin: "jīnyú", english: "Goldfish", cat: "Fish" },
  { hanzi: "鲈鱼", pinyin: "lúyú", english: "Bass", cat: "Fish" },
  { hanzi: "带鱼", pinyin: "dàiyú", english: "Hairtail fish", cat: "Fish" },
  { hanzi: "鲫鱼", pinyin: "jìyú", english: "Crucian carp", cat: "Fish" },
  { hanzi: "草鱼", pinyin: "cǎoyú", english: "Grass carp", cat: "Fish" },
  { hanzi: "鲤鱼", pinyin: "lǐyú", english: "Carp", cat: "Fish" },
  { hanzi: "罗非鱼", pinyin: "luófēiyú", english: "Tilapia", cat: "Fish" },
  { hanzi: "鳗鱼", pinyin: "mányú", english: "Eel", cat: "Fish" },

  { hanzi: "鲨鱼", pinyin: "shāyú", english: "Shark", cat: "Sea Creatures" },
  { hanzi: "鲸鱼", pinyin: "jīngyú", english: "Whale", cat: "Sea Creatures" },
  { hanzi: "海豚", pinyin: "hǎitún", english: "Dolphin", cat: "Sea Creatures" },
  { hanzi: "海龟", pinyin: "hǎiguī", english: "Turtle", cat: "Sea Creatures" },
  { hanzi: "螃蟹", pinyin: "pángxiè", english: "Crab", cat: "Sea Creatures" },
  { hanzi: "海马", pinyin: "hǎimǎ", english: "Sea horse", cat: "Sea Creatures" },
  { hanzi: "章鱼", pinyin: "zhāngyú", english: "Octopus", cat: "Sea Creatures" },
  { hanzi: "水母", pinyin: "shuǐmǔ", english: "Jellyfish", cat: "Sea Creatures" }
];
const CATEGORIES = ["All", ...new Set(ALL_CARDS.map(c => c.cat))];
let activeCategory = "All";
let cards = [...ALL_CARDS];
let index = 0;
let flipped = false;

function buildFilters() {
  const container = document.getElementById("filters");
  CATEGORIES.forEach(cat => {
    const btn = document.createElement("button");
    btn.className = "filter-btn" + (cat === activeCategory ? " active" : "");
    btn.textContent = cat;
    btn.onclick = () => setCategory(cat);
    container.appendChild(btn);
  });
}

function setCategory(cat) {
  activeCategory = cat;
  document.querySelectorAll(".filter-btn").forEach((b, i) => {
    b.classList.toggle("active", CATEGORIES[i] === cat);
  });
  cards = cat === "All" ? [...ALL_CARDS] : ALL_CARDS.filter(c => c.cat === cat);
  index = 0;
  resetCard();
  render();
}

function render() {
  const c = cards[index];
  document.getElementById("hanzi").textContent = c.hanzi;
  document.getElementById("pinyin").textContent = c.pinyin;
  document.getElementById("english").textContent = c.english;
  document.getElementById("cat-front").textContent = c.cat;
  document.getElementById("cat-back").textContent = c.cat;
  document.getElementById("counter").textContent = `Card ${index + 1} of ${cards.length}`;
  document.getElementById("progress").style.width = ((index + 1) / cards.length * 100) + "%";
}

function resetCard() {
  flipped = false;
  document.getElementById("card").classList.remove("flipped");
}

function flipCard() {
  flipped = !flipped;
  document.getElementById("card").classList.toggle("flipped", flipped);
}

function next() {
  index = (index + 1) % cards.length;
  resetCard();
  render();
}

function prev() {
  index = (index - 1 + cards.length) % cards.length;
  resetCard();
  render();
}

function shuffle() {
  for (let i = cards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cards[i], cards[j]] = [cards[j], cards[i]];
  }
  index = 0;
  resetCard();
  render();
}

document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight") next();
  else if (e.key === "ArrowLeft") prev();
  else if (e.key === " ") { e.preventDefault(); flipCard(); }
});

buildFilters();
render();
</script>
</body>
</html>
